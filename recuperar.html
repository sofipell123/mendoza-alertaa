<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendoza Alerta - Recuperar Contraseña</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container-auth">
        <div class="contenedor-auth">
            <h2 class="titulo-auth">Recuperar contraseña</h2>
            <p class="subtitulo-auth">Te enviaremos un correo con las instrucciones para restablecer tu contraseña.</p>

            <form class="formulario-auth">
                <div class="grupo-input">
                    <label>Correo electrónico</label>
                    <input type="email" placeholder="ejemplo@correo.com" required>
                </div>

                <button type="submit" class="btn-primario-auth">Enviar instrucciones</button>
            </form>

            <p class="enlace-cambio-auth">
                Volver al <a href="login.html">Iniciar sesión</a>
            </p>
        </div>
    </div>
</body>
</html>
