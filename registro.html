<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendoza Alerta - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container-auth">
        <div class="contenedor-auth">
            <h2 class="titulo-auth">Crear cuenta</h2>
            <p class="subtitulo-auth">Registrate para recibir alertas personalizadas.</p>

            <form class="formulario-auth" action="inicio.html" method="GET">
                <div class="grupo-input">
                    <label>Nombre completo</label>
                    <input type="text" placeholder="Juan Pérez" required>
                </div>
                <div class="grupo-input">
                    <label>Correo electrónico</label>
                    <input type="email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="grupo-input">
                    <label>Contraseña</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primario-auth">Registrarse</button>
            </form>

            <p class="enlace-cambio-auth">
                ¿Ya tenés cuenta? <a href="login.html">Iniciá sesión</a>
            </p>
        </div>
    </div>
    <form class="formulario-auth" action="inicio.html" method="GET">
    <button type="submit" class="btn-primario-auth">Registrarse</button>
</form>
</body>
</html>
